services:
  postgres:
    build:
      context: ./postgres
      dockerfile: Dockerfile
    container_name: cortex-postgres
    environment:
      POSTGRES_DB: cortex
      POSTGRES_USER: cortex
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    shm_size: '4gb'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cortex -d cortex"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: cortex-redis
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ML services (embedder, reranker, NER) are provided by the existing
  # GPU server infrastructure. Do NOT spin up duplicate containers.
  # - Embedder gateway: http://host.docker.internal:8080 (/v1/embeddings)
  # - Reranker:         http://host.docker.internal:9006 (/v1/rerank)
  # - GLiNER NER:       http://host.docker.internal:9002 (/v1/extract)

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: cortex-api
    environment:
      DATABASE_URL: postgresql+asyncpg://cortex:${POSTGRES_PASSWORD}@postgres:5432/cortex
      REDIS_URL: redis://redis:6379/0
      # ML services are on the host network (existing infrastructure)
      EMBEDDER_URL: http://host.docker.internal:8080
      RERANKER_URL: http://host.docker.internal:9006
      NER_URL: http://host.docker.internal:9002
      DATA_DIR: /data
    ports:
      - "8090:8080"
    volumes:
      - filedata:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: cortex-worker
    # TODO(Step 1.7): uncomment profiles line below once celery_app module exists
    profiles: ["worker"]  # excluded from default `docker compose up` until Step 1.7
    command: celery -A cortex.tasks.celery_app worker --loglevel=info --concurrency=2
    environment:
      DATABASE_URL: postgresql+asyncpg://cortex:${POSTGRES_PASSWORD}@postgres:5432/cortex
      REDIS_URL: redis://redis:6379/0
      EMBEDDER_URL: http://host.docker.internal:8080
      RERANKER_URL: http://host.docker.internal:9006
      NER_URL: http://host.docker.internal:9002
      DATA_DIR: /data
    volumes:
      - filedata:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  filedata:
