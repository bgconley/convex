# Cortex PostgreSQL 16 Configuration
# Tuned for Lenovo P620: 128 GB RAM, NVMe SSD, 12C/24T CPU

# -----------------------------
# Memory
# -----------------------------
shared_buffers = 16GB
effective_cache_size = 48GB
work_mem = 256MB
maintenance_work_mem = 4GB
wal_buffers = 64MB
huge_pages = try

# -----------------------------
# Parallelism
# -----------------------------
max_parallel_workers_per_gather = 4
max_parallel_workers = 8
max_parallel_maintenance_workers = 4
max_worker_processes = 12

# -----------------------------
# WAL
# -----------------------------
wal_level = replica
max_wal_size = 4GB
min_wal_size = 1GB
checkpoint_completion_target = 0.9

# -----------------------------
# Planner (NVMe SSD tuning)
# -----------------------------
random_page_cost = 1.1
effective_io_concurrency = 200
seq_page_cost = 1.0

# -----------------------------
# Connections
# -----------------------------
max_connections = 100
listen_addresses = '*'

# -----------------------------
# Extensions
# -----------------------------
shared_preload_libraries = 'age,pg_search'

# -----------------------------
# Logging
# -----------------------------
log_min_duration_statement = 1000
log_statement = 'none'
log_timezone = 'UTC'
timezone = 'UTC'
